name: Fast Tests (CI)
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  small-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v4
      - run: npm ci
      - name: Prettier check (fail on diff)
        run: npx prettier --check **/*.{ts,tsx,scss}
      - name: Architecture dependency check
        run: npm run dep:check
      - name: Run Small Tests (Fast Unit Tests)
        run: npm run test:small
